# ============================================================
# Alertmanager Configuration
# Network Engineer: Israr Sadaq
# Routes alerts to appropriate receivers
# ============================================================

global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@network-automation.com'
  smtp_auth_username: 'your-email@gmail.com'
  smtp_auth_password: 'your-app-password'

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: critical
      continue: true
    
    - match:
        severity: warning
      receiver: warning

receivers:
  - name: 'default'
    email_configs:
      - to: 'admin@network-automation.com'

  - name: 'critical'
    email_configs:
      - to: 'oncall@network-automation.com'
    webhook_configs:
      - url: 'https://slack.com/webhook/your-webhook-url'

  - name: 'warning'
    email_configs:
      - to: 'team@network-automation.com'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['instance']