modules:
  if_mib:
    walk:
      - sysDescr
      - sysName
      - sysUpTime
      - ifName
      - ifDescr
      - ifType
      - ifOperStatus
      - ifInOctets
      - ifOutOctets
      - ifInErrors
      - ifOutErrors
      - ifInDiscards
      - ifOutDiscards
    version: 2
    auth:
      community: public
    lookups:
      - source_indexes: [ifIndex]
        lookup: ifAlias
      - source_indexes: [ifIndex]
        lookup: ifDescr

  cisco_mib:
    walk:
      - 1.3.6.1.4.1.9.2.1.56   # cpu_5min
      - 1.3.6.1.4.1.9.2.1.57   # cpu_1min
      - 1.3.6.1.4.1.9.2.1.58   # cpu_5sec
      - 1.3.6.1.4.1.9.9.48.1.1.1.5.1  # memory_free
      - 1.3.6.1.4.1.9.9.48.1.1.1.6.1  # memory_used
    version: 2
    auth:
      community: public